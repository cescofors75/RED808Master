; ================================
; ESP32-S3 N16R8 (16MB Flash / 8MB PSRAM)
; RED808 Drum Machine - Optimized Build
; ================================

[platformio]
default_envs = redmaster-s3-r8n16
data_dir = data_gz

[env:redmaster-s3-r8n16]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = redmaster_esp32s3_r8n16
framework = arduino

; ================================
; CONFIGURACIÓN DE MEMORIA (N16R8)
; ================================
; Flash: 16MB (DIO, conservative/robust for ESP32-S3 R8N16 modules)
board_build.flash_mode = dio
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

; PSRAM: 8MB (Octal mode - OPI)
board_build.arduino.memory_type = dio_opi

; ================================
; Particiones (Custom 11MB para Samples)
; ================================
board_build.partitions = partitions_custom.csv
board_build.filesystem = littlefs

; ================================
; Flags de Compilación (Optimizado)
; ================================
; Excluir AudioEngine.cpp (legacy I2S, reemplazado por SPIMaster/Daisy)
build_src_filter = +<*> -<AudioEngine.cpp> -<AudioEngine.h> -<KitManager.cpp> -<KitManager.h> -<PhysControlButtons.cpp> -<PhysControlButtons.h>

build_flags =
    -DENABLE_PHYSICAL_BUTTONS=0
    ; --- AsyncTCP: stack grande para JSON processing en callbacks ---
    -DCONFIG_ASYNC_TCP_STACK_SIZE=32768
    -DCONFIG_ASYNC_TCP_PRIORITY=10
    -DCONFIG_ASYNC_TCP_QUEUE_SIZE=32
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    ; --- Optimizaciones de rendimiento ---
    -O2
    -DCORE_DEBUG_LEVEL=1
    -DRED808_MASTER_SPI_TRIGGER_TEST=0
    -DRED808_MASTER_UART0_DEBUG=1
    ; --- Red: evitar overrides de LWIP por build_flags; el core Arduino ya aporta sdkconfig.h ---

; ================================
; Upload & Monitor
; ================================
; upload_speed reducido: 921600 falla con auto-reset en este hardware.
; Usar flash_esp32.ps1 para subidas directas (más fiable).
; Si se usa "pio run -t upload": poner manualmente en modo bootloader (BOOT+RESET).
upload_speed = 460800
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
build_type = release

extra_scripts =
    pre:tools/prepare_data_gz.py

; ================================
; Librerías
; ================================
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    ESP32Async/AsyncTCP@^3.4.5
    ESP32Async/ESPAsyncWebServer@^3.7.10
    bblanchon/ArduinoJson@^6.21.3